<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Playlist Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: #222;
      margin: 5px 0;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stars {
      cursor: pointer;
    }
    .star {
      font-size: 20px;
      color: #555;
      transition: color 0.2s;
    }
    .star.filled {
      color: #ffd700;
    }
  </style>
</head>
<body>
  <h1>Interactive Playlist Test</h1>
  <ul id="playlist"></ul>

  <script>
    // Example playlist
    const playlist = [
      { title: "Song A", rating: 4 },
      { title: "Song B", rating: 5 },
      { title: "Song C", rating: 3 },
      { title: "Song D", rating: 2 },
      { title: "Song E", rating: 5 },
    ];

    const ul = document.getElementById("playlist");

    function renderPlaylist() {
      ul.innerHTML = "";
      playlist.forEach((song, index) => {
        const li = document.createElement("li");

        // Title
        const titleSpan = document.createElement("span");
        titleSpan.textContent = song.title;

        // Stars
        const starsSpan = document.createElement("span");
        starsSpan.className = "stars";
        for (let i = 1; i <= 5; i++) {
          const star = document.createElement("span");
          star.className = "star" + (i <= song.rating ? " filled" : "");
          star.textContent = "★";

          // Click to set rating
          star.addEventListener("click", () => {
            playlist[index].rating = i;
            renderPlaylist();
          });

          starsSpan.appendChild(star);
        }

        li.appendChild(titleSpan);
        li.appendChild(starsSpan);
        ul.appendChild(li);
      });
    }

    renderPlaylist();
  </script>
</body>
</html>
